<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon CV — Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-brand">
            <a href="index.html"><span class="brand-dot">&lt;</span>Dev<span class="brand-dot">/&gt;</span></a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" class="nav-link">Accueil</a></li>
            <li><a href="about.html" class="nav-link">À propos</a></li>
            <li><a href="skills.html" class="nav-link">Compétences</a></li>
            <li><a href="projects.html" class="nav-link">Projets</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
            <li><a href="cv.html" class="nav-link active">Mon CV</a></li>
        </ul>
    </nav>

    <!-- Page Hero -->
    <section class="page-hero">
        <div class="page-hero-content">
            <span class="section-tag">Mon parcours</span>
            <h1 class="page-hero-title">Mon <span class="highlight">CV</span></h1>
            <p class="page-hero-sub">Retrouvez ici mon curriculum vitae complet.</p>
        </div>
        <div class="hero-bg">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
        </div>
    </section>

    <!-- CV Section -->
    <section class="section">
        <div class="container">
            <div class="section-header reveal">
                <span class="section-tag">Document</span>
                <h2 class="section-title">Curriculum Vitae</h2>
            </div>
            <div class="cv-wrapper reveal">
                <div style="position: relative; width: 100%; height: 0; padding-top: 141.4286%;
                    padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
                    border-radius: 8px; will-change: transform;">
                    <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
                        src="https://www.canva.com/design/DAGjZr_LbOI/CjBkpIpK4zqxnBxU-hcZsQ/watch?embed"
                        allowfullscreen="allowfullscreen" allow="fullscreen">
                    </iframe>
                </div>
                <div style="text-align: center; margin-top: 1.2em;">
                    <a href="https://www.canva.com/design/DAGjZr_LbOI/CjBkpIpK4zqxnBxU-hcZsQ/watch?utm_content=DAGjZr_LbOI&utm_campaign=designshare&utm_medium=embeds&utm_source=link"
                        target="_blank" rel="noopener" class="btn btn-primary">
                        <i class="fas fa-download"></i> Télécharger mon CV
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-brand"><span class="brand-dot">&lt;</span>Dev<span class="brand-dot">/&gt;</span></p>
            <p>&copy; 2026 Mon Portfolio — Tous droits réservés</p>
        </div>
    </footer>

    <!-- AI Chat Widget -->
    <button class="ai-chat-btn" id="ai-chat-btn" aria-label="Assistant IA">
        <i class="fas fa-robot"></i>
        <span class="ai-badge">IA</span>
    </button>
    <div class="ai-chat-panel" id="ai-chat-panel">
        <div class="ai-chat-header">
            <div class="ai-avatar"><i class="fas fa-robot"></i></div>
            <div class="ai-info">
                <h4>Assistant IA</h4>
                <span>En ligne</span>
            </div>
            <button class="ai-close-btn" id="ai-close-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="ai-chat-messages" id="ai-chat-messages"></div>
        <div class="ai-suggestions">
            <button class="ai-suggestion-btn">Compétences</button>
            <button class="ai-suggestion-btn">Projets</button>
            <button class="ai-suggestion-btn">Me contacter</button>
            <button class="ai-suggestion-btn">Voir le CV</button>
        </div>
        <div class="ai-chat-input-area">
            <input type="text" class="ai-chat-input" id="ai-chat-input" placeholder="Posez votre question...">
            <button class="ai-send-btn" id="ai-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
